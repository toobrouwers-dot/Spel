<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FRACTURE">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0d1a">
  <title>FRACTURE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0d0d1a;
      overflow: hidden;
      touch-action: none;
      /* Prevent iOS bounce/overscroll */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: none;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      /* Fill safe area on iPhone with notch */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      touch-action: none;
    }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #4de8ff;
      font-family: sans-serif;
      font-size: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="canvas">
    <canvas id="canvas"></canvas>
  </div>
  <div id="status">Laden…</div>

  <script>
    // Vergrendel portrait op iOS via Screen Orientation API waar beschikbaar
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch(() => {});
    }

    // Verberg adresbalk op iOS Safari
    window.addEventListener('load', () => {
      setTimeout(() => window.scrollTo(0, 1), 100);
    });
  </script>

  $GODOT_HEAD_INCLUDE
  <script src="$GODOT_URL"></script>
  <script>
    const engine = new Engine($GODOT_CONFIG);
    engine.startGame({
      canvas: document.getElementById('canvas'),
      onProgress(current, total) {
        const pct = total > 0 ? Math.round(current / total * 100) : 0;
        document.getElementById('status').textContent = `Laden… ${pct}%`;
      },
    }).then(() => {
      document.getElementById('status').style.display = 'none';
    });
  </script>
</body>
</html>
